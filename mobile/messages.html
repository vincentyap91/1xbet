<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f2744" />
  <title>Messages - 1xBet Mobile</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="../css/auth-modals.css" />
  <link rel="stylesheet" href="css/mobile-home.css" />
  <link rel="stylesheet" href="css/mobile-messages.css" />
</head>
<body class="mh-page mh-page--messages is-logged-in" data-page="messages">
  <header class="mh-header" id="mh-header">
    <a href="index.html" class="mh-header__brand" aria-label="1xBet home">
      <img src="assets/logos/logo-1xbet.svg" alt="1xBet" width="92" height="24" />
      <img class="mh-header__flag" src="assets/logos/flag-my.svg" alt="" width="18" height="18" />
    </a>
    <div class="mh-header__actions" data-mh-auth-ready="1">
      <button type="button" class="mh-btn-deposit" data-mh-deposit>Deposit</button>
      <button type="button" class="mh-header__account" data-mh-account aria-label="Account">
        <img src="assets/icons/mh-account.svg" alt="" width="14" height="16" />
        <span class="mh-header__account-badge" aria-hidden="true"></span>
      </button>
    </div>
  </header>

  <div class="mh-msg-subbar">
    <a href="profile.html" class="mh-msg-subbar__back" aria-label="Back to profile">
      <img src="assets/icons/sp-back.svg" alt="" width="10" height="16" />
    </a>
    <h1 class="mh-msg-subbar__title" data-mh-msg-title>Messages (6)</h1>
  </div>

  <main class="mh-main">
    <label class="mh-msg-select-all">
      <input type="checkbox" data-mh-msg-select-all />
      <span>Select all</span>
    </label>

    <div class="mh-msg-list" data-mh-msg-list role="list"></div>
  </main>

  <div class="mh-msg-bar" role="toolbar" aria-label="Message actions">
    <button type="button" class="mh-msg-bar__delete" data-mh-msg-delete aria-label="Delete selected">
      <img src="../assets/images/account/icon-trash.svg" alt="" width="16" height="16" />
    </button>
    <button type="button" class="mh-msg-bar__read" data-mh-msg-mark-read>Mark as read</button>
  </div>

  <div class="mh-toast" id="mh-toast" role="status" aria-live="polite" hidden></div>
  <script src="../js/auth-modals.js"></script>
  <script src="../js/messages-data.js"></script>
  <script src="js/mobile-home.js"></script>
  <script src="js/mobile-messages.js"></script>
</body>
</html>
