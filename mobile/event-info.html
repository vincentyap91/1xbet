<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f2744" />
  <title>Event info - 1xBet Mobile</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="../css/auth-modals.css" />
  <link rel="stylesheet" href="css/mobile-home.css" />
  <link rel="stylesheet" href="css/mobile-event-info.css" />
</head>
<body class="mh-page mh-page--event-info" data-page="event-info">
  <header class="mh-header" id="mh-header">
    <a href="index.html" class="mh-header__brand" aria-label="1xBet home">
      <img src="assets/logos/logo-1xbet.svg" alt="1xBet" width="92" height="24" />
      <img class="mh-header__flag" src="assets/logos/flag-my.svg" alt="" width="18" height="18" />
    </a>
    <div class="mh-header__actions">
      <button type="button" class="btn-login mh-btn-login" data-auth-open="login">Log in</button>
      <a href="#reg-form" class="btn-register mh-btn-register" data-auth-open="register">Registration</a>
    </div>
  </header>

  <div class="mh-ei-subbar">
    <a href="javascript:history.back()" class="mh-ei-subbar__back" aria-label="Back" id="mh-ei-back">
      <img src="assets/icons/sp-back.svg" alt="" width="12" height="18" />
    </a>
    <h1 class="mh-ei-subbar__title">Event info</h1>
  </div>

  <main class="mh-main">
    <section class="mh-ei-card" aria-label="Event actions">
      <div class="mh-ei-menu" role="menu">
        <button type="button" class="mh-ei-menu__item" role="menuitem" data-mh-toast="Notifications coming soon">
          <img src="assets/icons/ei-bell.svg" alt="" width="20" height="20" />
          <span>Notifications</span>
        </button>
        <button type="button" class="mh-ei-menu__item mh-ei-menu__item--fav" role="menuitem" id="mh-ei-fav">
          <img src="assets/icons/ei-star.svg" alt="" width="20" height="20" />
          <span data-mh-ei-fav-label>Add to favorites</span>
        </button>
        <button type="button" class="mh-ei-menu__item" role="menuitem" data-mh-toast="Statistics coming soon">
          <img src="assets/icons/ei-stats.svg" alt="" width="20" height="20" />
          <span>Statistics</span>
        </button>
        <button type="button" class="mh-ei-menu__item" role="menuitem" data-mh-toast="Team information coming soon">
          <img src="assets/icons/ei-info.svg" alt="" width="20" height="20" />
          <span>Team information</span>
        </button>
      </div>
    </section>

    <section class="mh-ei-card mh-ei-meta" aria-label="Event details">
      <div class="mh-ei-meta__note">
        <img src="assets/icons/ei-info.svg" alt="" width="16" height="16" />
        <span id="mh-ei-note">2nd Qualification Round. Champions path. ...</span>
      </div>
      <div class="mh-ei-weather">
        <span class="mh-ei-weather__item">
          <img src="assets/icons/ei-cloud.svg" alt="" width="16" height="16" />
          <span id="mh-ei-temp">+27Â°C</span>
        </span>
        <span class="mh-ei-weather__item">
          <img src="assets/icons/ei-wind.svg" alt="" width="16" height="16" />
          <span id="mh-ei-wind">3.6</span>
        </span>
        <span class="mh-ei-weather__item">
          <img src="assets/icons/ei-pressure.svg" alt="" width="16" height="16" />
          <span id="mh-ei-pressure">758</span>
        </span>
        <span class="mh-ei-weather__item">
          <img src="assets/icons/ei-drop.svg" alt="" width="16" height="16" />
          <span id="mh-ei-humidity">55</span>
        </span>
      </div>
    </section>
  </main>

  <div class="mh-tab-flyout-backdrop" id="mh-tab-flyout-backdrop" hidden></div>

  <nav class="mh-tabbar" aria-label="Mobile primary">
    <div class="mh-tab-slot" data-mh-flyout-slot="sports">
      <button type="button" class="mh-tab is-active" data-mh-flyout-open="sports" aria-expanded="false" aria-controls="mh-flyout-sports" aria-haspopup="menu">
        <img src="assets/icons/tab-sports.svg" alt="" width="20" height="20" />
        <span>Sports</span>
      </button>
      <div class="mh-tab-flyout" id="mh-flyout-sports" role="menu" aria-label="Sports" hidden>
        <a href="national-team-line.html" class="mh-tab-flyout__item" role="menuitem">
          <img class="mh-tab-flyout__icon--flag" src="assets/logos/flag-my.svg" alt="" width="22" height="22" />
          <span>Bet on Your National Team</span>
        </a>
        <a href="national-team-live.html" class="mh-tab-flyout__item" role="menuitem">
          <img class="mh-tab-flyout__icon--live" src="assets/icons/tab-live.svg" alt="" width="22" height="22" />
          <span>Live</span>
        </a>
        <a href="sports.html" class="mh-tab-flyout__item" role="menuitem">
          <img src="assets/icons/tab-menu.svg" alt="" width="22" height="22" />
          <span>Sports</span>
        </a>
        <button type="button" class="mh-tab-flyout__close" data-mh-flyout-close aria-label="Close">
          <img src="assets/icons/tab-close.svg" alt="" width="22" height="22" />
        </button>
      </div>
    </div>

    <div class="mh-tab-slot" data-mh-flyout-slot="casino">
      <button type="button" class="mh-tab" data-mh-flyout-open="casino" aria-expanded="false" aria-controls="mh-flyout-casino" aria-haspopup="menu">
        <img src="assets/icons/tab-casino.svg" alt="" width="20" height="20" />
        <span>Casino</span>
      </button>
      <div class="mh-tab-flyout" id="mh-flyout-casino" role="menu" aria-label="Casino" hidden>
        <a href="casino.html" class="mh-tab-flyout__item" role="menuitem">
          <img src="assets/icons/tab-cherries.svg" alt="" width="22" height="22" />
          <span>Casino</span>
        </a>
        <a href="../live-casino.html" class="mh-tab-flyout__item" role="menuitem">
          <img src="assets/icons/tab-spade.svg" alt="" width="22" height="22" />
          <span>Live Casino</span>
        </a>
        <a href="casino.html" class="mh-tab-flyout__item" role="menuitem">
          <img src="assets/icons/tab-dice.svg" alt="" width="22" height="22" />
          <span>1xGames</span>
        </a>
        <button type="button" class="mh-tab-flyout__close" data-mh-flyout-close aria-label="Close">
          <img src="assets/icons/tab-close.svg" alt="" width="22" height="22" />
        </button>
      </div>
    </div>

    <button type="button" class="mh-tab mh-tab--coupon" id="mh-betslip-btn" aria-label="Bet slip">
      <span class="mh-tab__coupon-wrap">
        <span class="mh-tab__coupon-icon">
          <img src="assets/icons/tab-coupon.svg" alt="" width="18" height="18" />
        </span>
        <span class="mh-tab__badge" id="mh-bet-count" hidden>0</span>
      </span>
      <span>Bet slip</span>
    </button>
    <button type="button" class="mh-tab" data-auth-open="login">
      <img src="assets/icons/tab-user.svg" alt="" width="20" height="20" />
      <span>Log in</span>
    </button>
    <button type="button" class="mh-tab" id="mh-menu-btn" aria-expanded="false" aria-controls="mh-menu-sheet">
      <img src="assets/icons/tab-menu.svg" alt="" width="20" height="20" />
      <span>Menu</span>
    </button>
  </nav>

  <div class="mh-sheet" id="mh-menu-sheet" hidden>
    <div class="mh-sheet__backdrop" data-mh-close-menu></div>
    <div class="mh-sheet__panel" role="dialog" aria-label="Menu">
      <div class="mh-sheet__head">
        <strong>Menu</strong>
        <button type="button" class="mh-icon-btn" data-mh-close-menu aria-label="Close">âœ•</button>
      </div>
      <nav class="mh-sheet__nav">
        <a href="favourites.html">Favourites</a>
        <a href="search.html">Search</a>
        <a href="../promo.html">Promo</a>
        <a href="../terms.html">Terms</a>
      </nav>
    </div>
  </div>

  <div class="mh-toast" id="mh-toast" role="status" aria-live="polite" hidden></div>
  <script src="../js/auth-modals.js"></script>
  <script src="js/mobile-home.js"></script>
  <script src="js/mobile-favourites.js"></script>
  <script src="js/mobile-event-info.js"></script>
</body>
</html>
